<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kanban Board - Sistema de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header com título e botão dark mode -->
        <header class="header">
            <h1>📋 Kanban Board</h1>
            <button id="darkModeToggle" class="dark-mode-btn" aria-label="Alternar tema">🌙</button>
        </header>

        <!-- Formulário para adicionar nova tarefa -->
        <div class="add-task-container">
            <input type="text" id="taskInput" placeholder="Digite uma nova tarefa..." maxlength="100">
            <input type="date" id="taskDate" class="date-input">
            <button id="addTaskBtn" class="add-btn">+ Adicionar Tarefa</button>
        </div>

        <!-- Kanban Board - 3 colunas -->
        <div class="kanban-board">
            <!-- Coluna: A Fazer -->
            <div class="column" data-column="todo">
                <div class="column-header">
                    <h2>📝 A Fazer</h2>
                    <span class="task-count" id="todoCount">0</span>
                </div>
                <div class="task-list" id="todoList" data-column="todo"></div>
            </div>

            <!-- Coluna: Em Andamento -->
            <div class="column" data-column="doing">
                <div class="column-header">
                    <h2>⚡ Em Andamento</h2>
                    <span class="task-count" id="doingCount">0</span>
                </div>
                <div class="task-list" id="doingList" data-column="doing"></div>
            </div>

            <!-- Coluna: Concluído -->
            <div class="column" data-column="done">
                <div class="column-header">
                    <h2>✅ Concluído</h2>
                    <span class="task-count" id="doneCount">0</span>
                </div>
                <div class="task-list" id="doneList" data-column="done"></div>
                <button id="clearDoneBtn" class="clear-done-btn">🗑️ Limpar Concluídas</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
